<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="i18n.js"></script><script src="ui.js"></script><script src="auth.js"></script><title>Подать объявление — GeoBazar</title></head><body><script>header();</script><main>
<section class="gb-hero-mini"><h1>Подать объявление</h1><p>Выберите категорию, добавьте параметры, фото и описание.</p></section><section class="panel"><div class="form-grid"><div class="field full"><label>Заголовок</label><input id="listingTitle" placeholder="Например: BMW X5 2020"></div><div class="field"><label>Категория</label><select id="listingCategory" onchange="renderCategoryFields()"><option>Авто</option><option>Автозапчасти</option><option>Недвижимость</option><option>Работа</option><option>Услуги</option><option>Электроника</option></select></div><div class="field"><label>Цена</label><input id="listingPrice" type="number"></div><div class="field"><label>Валюта</label><select id="listingCurrency"><option>GEL</option><option>USD</option><option>EUR</option></select></div><div class="field"><label>Регион</label><select id="listingRegion" onchange="loadMunicipalities()"></select></div><div class="field"><label>Муниципалитет</label><select id="listingMunicipality" onchange="loadSettlements()"></select></div><div class="field"><label>Город / село</label><select id="listingSettlement"></select></div><div class="field"><label>Адрес</label><input id="listingAddress"></div><div id="smartCategoryFields" class="form-grid field full"></div><div class="field full"><label>Описание</label><textarea id="listingDescription"></textarea></div><div class="field full"><label>Фото</label><input id="listingImage" type="file" accept="image/*"></div></div><button class="btn btn-orange" onclick="createListing()">Опубликовать</button><p id="listingMessage"></p></section>
</main><script src="locations.js"></script><script src="category-fields.js"></script><script src="create-listing.js"></script><script>if(typeof initLocationFields==="function") initLocationFields(); if(typeof renderCategoryFields==="function") renderCategoryFields();</script><script>authModal();</script><script src="support.js"></script><script src="ai-placeholder.js"></script></body></html>
