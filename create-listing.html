<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Подать объявление — GeoBazar</title><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><script src="js/ui.js"></script><script src="js/auth.js"></script></head><body><script>header();</script><main><section class="panel"><h1>Подать объявление</h1><div class="form-grid"><div class="field full"><label>Категория</label><select id="listingCategory" onchange="renderCategoryFields()"></select></div><div class="field full"><label>Подкатегория</label><select id="listingSubcategory"></select></div><div class="field full"><label>Заголовок</label><input id="listingTitle" placeholder="Например: BMW 750 2014"></div><div class="field"><label>Цена</label><input id="listingPrice" type="number"></div><div class="field"><label>Валюта</label><select id="listingCurrency"><option>GEL</option><option>USD</option><option>EUR</option></select></div><div class="field"><label>Город</label><input id="listingCity"></div><div class="field"><label>Телефон</label><input id="listingPhone"></div><div class="field"><label>WhatsApp</label><input id="listingWhatsapp"></div><div class="field full"><label>Фото объявления</label><input id="listingImages" type="file" accept="image/*" multiple></div><div id="extraFields" class="form-grid full"></div><div class="field full"><label>Описание</label><textarea id="listingDescription"></textarea></div></div><div class="panel" style="background:#fff7ed;border:1px solid #fed7aa;margin:15px 0"><b>🤖 AI Помощник GeoBazar</b><p>Сейчас создаёт шаблон описания. Позже подключим настоящий AI для перевода, цены и фото.</p><button class="btn btn-blue" onclick="fillAI()">✨ Помочь написать объявление</button></div><button class="btn btn-orange" onclick="createListing()">Опубликовать</button><p id="listingMessage" class="message"></p></section></main><script src="js/profile.js"></script><script src="js/create-listing.js"></script><script>initCreateListing();</script><script>authModal();</script><script>footer();</script></body></html>
