<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Объявления — GeoBazar</title><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><script src="js/ui.js"></script><script src="js/auth.js"></script></head><body><script>header();</script><main><section class="panel"><h1>Объявления</h1><div class="search-box" style="box-shadow:none;max-width:none"><select id="filterCategory"><option value="">Все категории</option></select><input id="filterText" placeholder="Поиск по названию"><select id="filterCity"><option value="">Вся Грузия</option></select><button class="btn btn-blue" onclick="applyFilters()">Найти</button></div></section><section class="section"><div class="grid-4" id="listingsBox"></div></section></main><script src="js/listings.js"></script><script>CATEGORIES.forEach(c=>document.getElementById('filterCategory').innerHTML+=`<option value="${c.ru}">${catName(c)}</option>`);CITIES.forEach(c=>document.getElementById('filterCity').innerHTML+=`<option>${c}</option>`);document.getElementById('filterCategory').value=qs('category')||'';document.getElementById('filterCity').value=qs('city')||'';function applyFilters(){renderListings('listingsBox',{category:document.getElementById('filterCategory').value,city:document.getElementById('filterCity').value});}applyFilters();</script><script>authModal();</script><script>footer();</script></body></html>
