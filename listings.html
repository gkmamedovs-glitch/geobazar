<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="i18n.js"></script><script src="ui.js"></script><script src="auth.js"></script><title>Объявления — GeoBazar</title></head><body><script>header();</script><main>
<section class="gb-hero-mini"><h1>Поиск объявлений</h1><p>Найдите авто, недвижимость, работу, услуги и товары по всей Грузии</p><div class="gb-search-panel"><input id="q" placeholder="BMW X5, квартира Батуми..."><select id="filterCategory" onchange="renderFilterByCategory(this.value)"><option value="">Все категории</option><option>Авто</option><option>Недвижимость</option><option>Автозапчасти</option><option>Работа</option><option>Услуги</option></select><select id="filterRegion" onchange="loadMunicipalities('filterRegion','filterMunicipality')"><option>Вся Грузия</option></select><button class="btn btn-blue" onclick="applyFilters()">Найти</button></div></section>
<section class="panel"><div class="form-grid"><div class="field"><label>Цена от</label><input id="priceFrom" type="number"></div><div class="field"><label>Цена до</label><input id="priceTo" type="number"></div><div class="field"><label>Муниципалитет</label><select id="filterMunicipality" onchange="loadSettlements('filterMunicipality','filterSettlement')"></select></div><div class="field"><label>Город / село</label><select id="filterSettlement"></select></div></div><div id="categoryFilters" class="form-grid"></div></section>
<section class="panel"><div class="gb-page-title"><h1>Результаты</h1><button class="btn btn-light" onclick="resetFilters()">Сбросить</button></div><div id="listingsBox" class="grid-4">Загрузка...</div></section>
</main><script src="locations.js"></script><script src="listings.js"></script><script src="search-filters.js"></script><script>initSearchFilters();</script><script>authModal();</script><script src="support.js"></script><script src="ai-placeholder.js"></script></body></html>
