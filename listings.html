<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Объявления — GeoBazar</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script><script src="i18n.js"></script><script src="ui.js"></script><script src="auth.js"></script>
</head>
<body>
<script>header();</script>
<main>
  <section class="panel">
    <h1>Поиск объявлений</h1>
    <div class="form-grid">
      <div class="field full"><label>Что ищете?</label><input id="q" placeholder="BMW X5, квартира Батуми, запчасть..."></div>

      <div class="field">
        <label>Категория</label>
        <select id="filterCategory" onchange="renderFilterByCategory(this.value)">
          <option value="">Все категории</option>
          <option>Авто</option>
          <option>Автозапчасти</option>
          <option>Недвижимость</option>
          <option>Электроника</option>
          <option>Работа</option>
          <option>Услуги</option>
          <option>Животные</option>
          <option>Грузоперевозки</option>
          <option>Туризм</option>
        </select>
      </div>

      <div class="field"><label>Цена от</label><input id="priceFrom" type="number"></div>
      <div class="field"><label>Цена до</label><input id="priceTo" type="number"></div>

      <div class="field"><label>Регион</label><select id="filterRegion" onchange="loadMunicipalities('filterRegion','filterMunicipality')"></select></div>
      <div class="field"><label>Муниципалитет</label><select id="filterMunicipality" onchange="loadSettlements('filterMunicipality','filterSettlement')"></select></div>
      <div class="field"><label>Город / село</label><select id="filterSettlement"></select></div>
    </div>

    <div id="categoryFilters" class="form-grid"></div>

    <button class="btn btn-blue" onclick="applyFilters()">Найти</button>
    <button class="btn btn-light" onclick="resetFilters()">Сбросить</button>
  </section>

  <section class="section">
    <h2>Результаты</h2>
    <div id="listingsBox" class="grid-4">Загрузка...</div>
  </section>
</main>
<script>authModal();</script><script>footer();</script>
<script src="locations.js"></script><script src="listings.js"></script><script src="search-filters.js"></script><script src="support.js"></script>
<script>initSearchFilters();</script>
</body>
</html>
