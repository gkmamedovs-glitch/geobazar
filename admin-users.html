<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пользователи — Admin</title><link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script><script src="i18n.js"></script><script src="ui.js"></script><script src="auth.js"></script></head>
<body><script>header();</script><main><section class="panel"><h1>Пользователи</h1><div id="adminList">Загрузка...</div></section></main>
<script>authModal();</script><script>footer();</script><script src="admin.js"></script>
<script>
async function loadTable(){
 if(!await requireAdmin()) return;
 const {data,error} = await supabaseClient.from("profiles").select("*").limit(50);
 const box=document.getElementById("adminList");
 if(error){box.innerHTML=error.message;return;}
 box.innerHTML=(data||[]).map(x=>`<div class="panel"><pre style="white-space:pre-wrap">${JSON.stringify(x,null,2)}</pre></div>`).join("");
}
loadTable();
</script></body></html>
