<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактировать объявление — GeoBazar</title><link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script><script src="i18n.js"></script><script src="ui.js"></script><script src="auth.js"></script>
</head><body><script>header();</script>
<main><section class="panel"><h1>✏️ <span data-i18n="edit_listing">Редактировать объявление</span></h1>
<div class="form-grid">
<div class="field full"><label data-i18n="title">Заголовок</label><input id="listingTitle"></div>
<div class="field"><label data-i18n="category">Категория</label><input id="listingCategory"></div>
<div class="field"><label data-i18n="price">Цена</label><input id="listingPrice" type="number"></div>
<div class="field"><label>Валюта</label><select id="listingCurrency"><option>GEL</option><option>USD</option><option>EUR</option></select></div>
<div class="field"><label data-i18n="city">Город</label><input id="listingCity"></div>

<div class="field"><label>Регион</label><select id="listingRegion" onchange="loadMunicipalities()"></select></div>
<div class="field"><label>Муниципалитет / район</label><select id="listingMunicipality" onchange="loadSettlements()"></select></div>
<div class="field"><label>Город / село</label><select id="listingSettlement"></select></div>
<div class="field"><label>Адрес</label><input id="listingAddress"></div>
<div id="smartCategoryFields" class="form-grid full"></div>
<div class="field full"><label data-i18n="description">Описание</label><textarea id="listingDescription"></textarea></div>
</div>
<button class="btn btn-blue" onclick="saveListingEdit()" data-i18n="save">Сохранить</button>
<button class="btn btn-light" onclick="archiveListing()" data-i18n="archive">Архивировать</button>
<button class="btn btn-light" onclick="restoreListing()" data-i18n="restore">Восстановить</button>
<button class="btn btn-orange" onclick="boostListing()" data-i18n="boost">Поднять</button>
<button class="btn btn-orange" onclick="vipListing()" data-i18n="vip">VIP</button>
<button class="btn btn-danger" onclick="deleteListing()" data-i18n="delete">Удалить</button>
<p id="editMessage" class="message"></p>
<div id="statsBox" class="panel" style="margin-top:15px"></div>
</section></main>
<script>authModal();</script><script>footer();</script><script src="locations.js"></script><script src="category-fields.js"></script><script src="payments.js"></script><script src="edit-listing.js"></script><script>loadEditListing();</script>
<script src="support.js"></script>
<script src="ai-placeholder.js"></script>\n</body></html>
